<!doctype html>
<html><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Colors — Pop palette</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 20px; background: var(--paper); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw {
    border: var(--bw-3) solid var(--ink);
    box-shadow: var(--shadow-sm);
    padding: 12px;
    height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .name { font-family: var(--font-display); font-size: 13px; text-transform: uppercase; color: var(--ink); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--ink); }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#FF6B9D"><span class="name">Pink</span><span class="hex">#FF6B9D</span></div>
  <div class="sw" style="background:#C6F432"><span class="name">Lime</span><span class="hex">#C6F432</span></div>
  <div class="sw" style="background:#4D7CFF"><span class="name">Blue</span><span class="hex">#4D7CFF</span></div>
  <div class="sw" style="background:#FF7A2E"><span class="name">Orange</span><span class="hex">#FF7A2E</span></div>
  <div class="sw" style="background:#B57BFF"><span class="name">Purple</span><span class="hex">#B57BFF</span></div>
  <div class="sw" style="background:#7FE3C4"><span class="name">Mint</span><span class="hex">#7FE3C4</span></div>
</div>
<div data-brut="theme-switcher"></div>
<script src="../dist/brut.js"></script>
</body></html>
