<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Table — Inline Edit</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: var(--sp-6); background: var(--paper); font-family: var(--font-sans); }
  h3 { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--tracking-wider); font-size: var(--fs-sm); margin: var(--sp-6) 0 var(--sp-2); }
  .wrap { max-width: 880px; }
  .log { margin-top: var(--sp-4); font-family: var(--font-mono); font-size: var(--fs-xs); background: var(--ink); color: var(--paper); padding: var(--sp-3) var(--sp-4); min-height: 40px; }
</style></head>
<body>

<div class="wrap">
  <h3>Inline-edit cells — text + select</h3>
  <p style="margin-bottom: var(--sp-4); font-size: var(--fs-sm);">Click any highlighted cell to edit. Enter commits, Escape cancels.</p>

  <form id="edit-form">
    <table class="brut-table brut-table--striped" data-brut="table">
      <thead class="brut-table__head">
        <tr class="brut-table__row">
          <th class="brut-table__cell brut-table__cell--sortable" data-sort-key="name">Name</th>
          <th class="brut-table__cell brut-table__cell--sortable" data-sort-key="role">Role</th>
          <th class="brut-table__cell brut-table__cell--sortable" data-sort-key="status">Status</th>
          <th class="brut-table__cell brut-table__cell--sortable brut-table__cell--num" data-sort-key="qty">Qty</th>
        </tr>
      </thead>
      <tbody>
        <tr class="brut-table__row" data-row-key="r1">
          <td class="brut-table__cell" data-brut="table-edit" data-col="name" data-sort-value="Alice">Alice</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="role" data-sort-value="Designer">Designer</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="status" data-brut-edit-options="active,paused,archived" data-sort-value="active">active</td>
          <td class="brut-table__cell brut-table__cell--num" data-brut="table-edit" data-col="qty" data-sort-value="14">14</td>
        </tr>
        <tr class="brut-table__row" data-row-key="r2">
          <td class="brut-table__cell" data-brut="table-edit" data-col="name" data-sort-value="Bob">Bob</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="role" data-sort-value="Engineer">Engineer</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="status" data-brut-edit-options="active,paused,archived" data-sort-value="paused">paused</td>
          <td class="brut-table__cell brut-table__cell--num" data-brut="table-edit" data-col="qty" data-sort-value="7">7</td>
        </tr>
        <tr class="brut-table__row" data-row-key="r3">
          <td class="brut-table__cell" data-brut="table-edit" data-col="name" data-sort-value="Carla">Carla</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="role" data-sort-value="PM">PM</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="status" data-brut-edit-options="active,paused,archived" data-sort-value="active">active</td>
          <td class="brut-table__cell brut-table__cell--num" data-brut="table-edit" data-col="qty" data-sort-value="22">22</td>
        </tr>
        <tr class="brut-table__row" data-row-key="r4">
          <td class="brut-table__cell" data-brut="table-edit" data-col="name" data-sort-value="Dan">Dan</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="role" data-sort-value="Engineer">Engineer</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="status" data-brut-edit-options="active,paused,archived" data-sort-value="archived">archived</td>
          <td class="brut-table__cell brut-table__cell--num" data-brut="table-edit" data-col="qty" data-sort-value="3">3</td>
        </tr>
        <tr class="brut-table__row" data-row-key="r5">
          <td class="brut-table__cell" data-brut="table-edit" data-col="name" data-sort-value="Eve">Eve</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="role" data-sort-value="QA">QA</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="status" data-brut-edit-options="active,paused,archived" data-sort-value="active">active</td>
          <td class="brut-table__cell brut-table__cell--num" data-brut="table-edit" data-col="qty" data-sort-value="11">11</td>
        </tr>
        <tr class="brut-table__row" data-row-key="r6">
          <td class="brut-table__cell" data-brut="table-edit" data-col="name" data-sort-value="Frank">Frank</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="role" data-sort-value="DevOps">DevOps</td>
          <td class="brut-table__cell" data-brut="table-edit" data-col="status" data-brut-edit-options="active,paused,archived" data-sort-value="paused">paused</td>
          <td class="brut-table__cell brut-table__cell--num" data-brut="table-edit" data-col="qty" data-sort-value="5">5</td>
        </tr>
      </tbody>
    </table>
  </form>

  <h3>Change log</h3>
  <div class="log" id="log">No changes yet.</div>
</div>

<script src="../dist/brut.js"></script>
<script>
  document.addEventListener('brut:change', function (e) {
    var d = e.detail;
    if (!d || !d.rowKey) return;
    var log = document.getElementById('log');
    var line = 'row=' + d.rowKey + ' col=' + d.colKey + ' "' + d.prev + '" → "' + d.value + '"';
    log.textContent = line + (log.textContent === 'No changes yet.' ? '' : '\n' + log.textContent);
  });
</script>
</body></html>
