<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hard-edged shadows</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 36px 28px; background: var(--paper); color: var(--ink); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 22px; }
  .box {
    height: 70px;
    background: var(--bone);
    border: 4px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 2px;
  }
  .nm { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--concrete-400); }
</style></head>
<body>
<div class="row">
  <div class="box" style="box-shadow: var(--shadow-xs);"><span class="nm">XS</span><span class="lab">2 2 0</span></div>
  <div class="box" style="box-shadow: var(--shadow-sm);"><span class="nm">SM</span><span class="lab">4 4 0</span></div>
  <div class="box" style="box-shadow: var(--shadow-md);"><span class="nm">MD</span><span class="lab">6 6 0</span></div>
  <div class="box" style="box-shadow: var(--shadow-lg);"><span class="nm">LG</span><span class="lab">8 8 0</span></div>
  <div class="box" style="box-shadow: var(--shadow-xl);"><span class="nm">XL</span><span class="lab">12 12 0</span></div>
  <div class="box" style="box-shadow: var(--shadow-2xl);"><span class="nm">2XL</span><span class="lab">16 16 0</span></div>
</div>
<div data-brut="theme-switcher"></div>
<script src="../dist/brut.js"></script>
</body></html>
