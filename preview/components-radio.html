<!doctype html>
<html><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRUT — Radio preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .row { display: flex; gap: var(--sp-4); align-items: center; flex-wrap: wrap; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Default + selected</h2>
<div class="row">
  <label class="brut-radio brut-radio--on" data-brut="radio"><input type="radio" name="size" value="md" hidden checked /></label>
  <label class="brut-radio" data-brut="radio"><input type="radio" name="size" value="lg" hidden /></label>
</div>

<h2>Group with labels (single name attribute)</h2>
<div class="row" style="gap: var(--sp-6);">
  <label style="display:inline-flex; gap:var(--sp-3); align-items:center;">
    <span class="brut-radio brut-radio--on" data-brut="radio"><input type="radio" name="plan" value="basic" hidden checked /></span>
    <span>Basic</span>
  </label>
  <label style="display:inline-flex; gap:var(--sp-3); align-items:center;">
    <span class="brut-radio" data-brut="radio"><input type="radio" name="plan" value="pro" hidden /></span>
    <span>Pro</span>
  </label>
  <label style="display:inline-flex; gap:var(--sp-3); align-items:center;">
    <span class="brut-radio" data-brut="radio"><input type="radio" name="plan" value="enterprise" hidden /></span>
    <span>Enterprise</span>
  </label>
</div>

<h2>Event log</h2>
<pre id="log">Pick a plan…</pre>

<script src="../dist/brut.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-brut="radio"]').forEach(function (el) {
      el.addEventListener('brut:change', function (e) {
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] ' + JSON.stringify(e.detail);
      });
    });
  });
</script>
<div data-brut="theme-switcher"></div>
</body></html>
