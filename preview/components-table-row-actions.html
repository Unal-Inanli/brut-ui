<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Table — Row Actions</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--paper); font-family: var(--font-sans); }
  h3 { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--tracking-wider); font-size: var(--fs-sm); margin: 24px 0 8px; }
  .wrap { max-width: 800px; }
  .event-log { margin-top: var(--sp-4); padding: var(--sp-3) var(--sp-4); background: var(--bone); border: var(--bw-2) solid var(--ink); font-family: var(--font-mono); font-size: var(--fs-sm); min-height: 2.5em; }
</style></head>
<body>

<div class="wrap">
  <h3>Row Actions — shared kebab menu</h3>
  <table class="brut-table brut-table--striped">
    <thead class="brut-table__head">
      <tr class="brut-table__row">
        <th class="brut-table__cell">Name</th>
        <th class="brut-table__cell">Role</th>
        <th class="brut-table__cell brut-table__cell--num">Items</th>
        <th class="brut-table__cell" style="width: var(--sp-10);"></th>
      </tr>
    </thead>
    <tbody>
      <tr class="brut-table__row">
        <td class="brut-table__cell">Alice</td>
        <td class="brut-table__cell">Designer</td>
        <td class="brut-table__cell brut-table__cell--num">14</td>
        <td class="brut-table__cell"><button class="brut-table__row-actions-btn" data-brut-row-actions="row-menu" aria-label="Row actions">&#8801;</button></td>
      </tr>
      <tr class="brut-table__row">
        <td class="brut-table__cell">Bob</td>
        <td class="brut-table__cell">Engineer</td>
        <td class="brut-table__cell brut-table__cell--num">7</td>
        <td class="brut-table__cell"><button class="brut-table__row-actions-btn" data-brut-row-actions="row-menu" aria-label="Row actions">&#8801;</button></td>
      </tr>
      <tr class="brut-table__row">
        <td class="brut-table__cell">Carla</td>
        <td class="brut-table__cell">PM</td>
        <td class="brut-table__cell brut-table__cell--num">22</td>
        <td class="brut-table__cell"><button class="brut-table__row-actions-btn" data-brut-row-actions="row-menu" aria-label="Row actions">&#8801;</button></td>
      </tr>
      <tr class="brut-table__row">
        <td class="brut-table__cell">Dan</td>
        <td class="brut-table__cell">Engineer</td>
        <td class="brut-table__cell brut-table__cell--num">3</td>
        <td class="brut-table__cell"><button class="brut-table__row-actions-btn" data-brut-row-actions="row-menu" aria-label="Row actions">&#8801;</button></td>
      </tr>
      <tr class="brut-table__row">
        <td class="brut-table__cell">Eve</td>
        <td class="brut-table__cell">QA</td>
        <td class="brut-table__cell brut-table__cell--num">11</td>
        <td class="brut-table__cell"><button class="brut-table__row-actions-btn" data-brut-row-actions="row-menu" aria-label="Row actions">&#8801;</button></td>
      </tr>
      <tr class="brut-table__row">
        <td class="brut-table__cell">Frank</td>
        <td class="brut-table__cell">DevOps</td>
        <td class="brut-table__cell brut-table__cell--num">5</td>
        <td class="brut-table__cell"><button class="brut-table__row-actions-btn" data-brut-row-actions="row-menu" aria-label="Row actions">&#8801;</button></td>
      </tr>
    </tbody>
  </table>

  <!-- Shared row-action menu (one menu, repositioned per row) -->
  <div class="brut-menu" data-brut="menu" id="row-menu" hidden>
    <button class="brut-menu__item" type="button" data-brut-action="edit">Edit</button>
    <button class="brut-menu__item" type="button" data-brut-action="duplicate">Duplicate</button>
    <hr class="brut-menu__sep"/>
    <button class="brut-menu__item brut-menu__item--danger" type="button" data-brut-action="delete">Delete</button>
  </div>

  <p style="margin-top: var(--sp-4); font-size: var(--fs-sm); color: var(--concrete-400);">Last action dispatched:</p>
  <output class="event-log" id="action-log">—</output>
</div>

<script src="../dist/brut.js"></script>
<script>
  document.addEventListener('brut:row-action', function (e) {
    var rows = document.querySelectorAll('.brut-table tbody tr');
    var rowIndex = -1;
    for (var i = 0; i < rows.length; i++) {
      if (rows[i] === e.detail.row) { rowIndex = i + 1; break; }
    }
    document.getElementById('action-log').textContent =
      e.detail.action + ' (row ' + rowIndex + ')';
  });
</script>
</body></html>
