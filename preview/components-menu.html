<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Menu</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); min-height: 100vh; }
  .row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 32px; }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 16px; letter-spacing: 0.06em; margin: 18px 0 8px; }
</style></head>
<body>

<h2>Trigger + dropdown menu</h2>
<div class="row">
  <button class="brut-btn brut-btn--primary" type="button" data-brut-menu-open="m-actions">ACTIONS</button>
  <div class="brut-menu" id="m-actions" data-brut="menu" hidden>
    <button class="brut-menu__item" type="button">Edit</button>
    <button class="brut-menu__item" type="button">Duplicate</button>
    <button class="brut-menu__item" type="button">Share</button>
    <hr class="brut-menu__sep"/>
    <button class="brut-menu__item brut-menu__item--danger" type="button">Delete</button>
  </div>
</div>

<h2>Overflow menu (link items)</h2>
<div class="row">
  <button class="brut-btn" type="button" data-brut-menu-open="m-links" aria-label="More">…</button>
  <div class="brut-menu" id="m-links" data-brut="menu" hidden>
    <a class="brut-menu__item" href="#">Profile</a>
    <a class="brut-menu__item" href="#">Settings</a>
    <a class="brut-menu__item" href="#">Help</a>
    <hr class="brut-menu__sep"/>
    <a class="brut-menu__item brut-menu__item--danger" href="#">Sign out</a>
  </div>
</div>

<h2>Static demo (rendered open in-place)</h2>
<div class="brut-menu" style="position: static; display: inline-block;">
  <button class="brut-menu__item" type="button">Item one</button>
  <button class="brut-menu__item" type="button">Item two</button>
  <hr class="brut-menu__sep"/>
  <button class="brut-menu__item brut-menu__item--danger" type="button">Destructive</button>
</div>

<script src="../dist/brut.js"></script>
<div data-brut="theme-switcher"></div>
</body></html>
