<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRUT — Search preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 760px; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Empty</h2>
<div class="brut-field" style="max-width:400px;">
  <label class="brut-field__label">Search</label>
  <div class="brut-search" data-brut="search">
    <input class="brut-input" type="search" placeholder="Search…">
    <button class="brut-search__clear" aria-label="Clear">×</button>
  </div>
</div>

<h2>With value</h2>
<div class="brut-field" style="max-width:400px;">
  <label class="brut-field__label">Filter components</label>
  <div class="brut-search" data-brut="search">
    <input class="brut-input" type="search" value="button" placeholder="Search…">
    <button class="brut-search__clear" aria-label="Clear">×</button>
  </div>
</div>

<h2>Narrow width</h2>
<div class="brut-field" style="max-width:240px;">
  <label class="brut-field__label">Quick find</label>
  <div class="brut-search" data-brut="search">
    <input class="brut-input" type="search" placeholder="Find…">
    <button class="brut-search__clear" aria-label="Clear">×</button>
  </div>
</div>

<h2>Event log</h2>
<pre id="log">Type to search…</pre>

<script src="../dist/brut.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-brut="search"] input').forEach(function (input) {
      input.addEventListener('input', function () {
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] value: "' + input.value + '"';
      });
    });
  });
</script>
<div data-brut="theme-switcher"></div>
</body></html>
