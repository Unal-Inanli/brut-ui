<!doctype html>
<html><head><meta charset="utf-8"/>
<title>BRUT — Dropzone preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Single file</h2>
<label class="brut-dropzone" data-brut="dropzone" style="max-width:480px;">
  <input type="file" name="upload">
  <span class="brut-dropzone__hint">Drop a file here.</span>
  <span class="brut-dropzone__sub">Or click to browse.</span>
</label>

<h2>Multiple files</h2>
<label class="brut-dropzone" data-brut="dropzone" style="max-width:480px;">
  <input type="file" name="assets" multiple accept="image/*,.pdf">
  <span class="brut-dropzone__hint">Drop images or PDFs here.</span>
  <span class="brut-dropzone__sub">Or click to browse. Multiple allowed.</span>
</label>

<h2>Event log</h2>
<pre id="log">Drop or choose files…</pre>

<script src="../dist/brut.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-brut="dropzone"]').forEach(function (el) {
      el.addEventListener('brut:change', function (e) {
        var names = Array.prototype.map.call(e.detail.files, function (f) { return f.name; });
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] ' + JSON.stringify(names);
      });
    });
  });
</script>
</body></html>
