<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Alerts</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--paper); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .alert {
    border: 4px solid var(--ink);
    box-shadow: var(--shadow-sm);
    padding: 12px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .icon {
    width: 36px; height: 36px;
    border: 3px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-display);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .ok { background: var(--success-bg);}
  .ok .icon { background: var(--success); color: var(--ink);}
  .warn { background: var(--warning-bg);}
  .warn .icon { background: var(--warning); color: var(--ink);}
  .err { background: var(--danger-bg);}
  .err .icon { background: var(--danger); color: var(--paper);}
  .info { background: var(--info-bg);}
  .info .icon { background: var(--info); color: var(--paper);}
  .ttl { font-family: var(--font-display); font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em;}
  .msg { font-size: 13px; line-height: 1.4; margin-top: 2px; }
</style></head>
<body>
<div class="stack">
  <div class="alert ok"><div class="icon">✓</div><div><div class="ttl">Shipped it.</div><div class="msg">Build pushed to production · 0 errors · 12s.</div></div></div>
  <div class="alert warn"><div class="icon">!</div><div><div class="ttl">Heads up.</div><div class="msg">You're using the dev API key in production.</div></div></div>
  <div class="alert err"><div class="icon">✕</div><div><div class="ttl">Broken.</div><div class="msg">Network unreachable. Retrying in 5s.</div></div></div>
</div>
</body></html>
