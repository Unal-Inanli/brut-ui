<!doctype html>
<html><head><meta charset="utf-8"/>
<title>BRUT — Dialog preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Confirm dialog</h2>
<div class="row">
  <button class="brut-btn" data-brut-open="dlg-confirm">Open confirm</button>
</div>

<div class="brut-scrim" id="dlg-confirm-scrim" hidden></div>
<div class="brut-dialog" id="dlg-confirm" data-brut="dialog" data-brut-scrim="dlg-confirm-scrim" hidden role="dialog" aria-modal="true" aria-labelledby="dlg-confirm-title">
  <div class="brut-dialog__head">
    <span id="dlg-confirm-title">DELETE PROJECT?</span>
    <button class="brut-dialog__x" data-brut-close>×</button>
  </div>
  <div class="brut-dialog__body">
    This nukes <strong>project-alpha</strong> and all its history. Cannot be undone.
  </div>
  <div class="brut-dialog__foot">
    <button class="brut-btn" data-brut-close>Cancel</button>
    <button class="brut-btn brut-btn--danger" data-brut-close>Yes, delete</button>
  </div>
</div>

<h2>Info dialog</h2>
<div class="row">
  <button class="brut-btn" data-brut-open="dlg-info">Open info</button>
</div>

<div class="brut-scrim" id="dlg-info-scrim" hidden></div>
<div class="brut-dialog" id="dlg-info" data-brut="dialog" data-brut-scrim="dlg-info-scrim" hidden role="dialog" aria-modal="true" aria-labelledby="dlg-info-title">
  <div class="brut-dialog__head">
    <span id="dlg-info-title">KEYBOARD SHORTCUTS</span>
    <button class="brut-dialog__x" data-brut-close>×</button>
  </div>
  <div class="brut-dialog__body">
    <p>Ctrl+K — open command palette</p>
    <p>Ctrl+S — save</p>
    <p>Escape — close dialog</p>
  </div>
  <div class="brut-dialog__foot">
    <button class="brut-btn" data-brut-close>Got it</button>
  </div>
</div>

<h2>Event log</h2>
<pre id="log">Open a dialog…</pre>

<script src="../dist/brut.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-brut="dialog"]').forEach(function (el) {
      el.addEventListener('brut:open',  function () {
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] opened: ' + el.id;
      });
      el.addEventListener('brut:close', function () {
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] closed: ' + el.id;
      });
    });
  });
</script>
</body></html>
