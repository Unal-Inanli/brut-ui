<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Borders + Radii</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--paper); color: var(--ink); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .box {
    height: 88px;
    background: var(--bone);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
  }
  .nm { font-family: var(--font-display); font-size: 12px; text-transform: uppercase; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--concrete-400); }
</style></head>
<body>
<div class="row">
  <div class="box" style="border: 2px solid var(--ink);"><span class="nm">bw-1</span><span class="lab">2px</span></div>
  <div class="box" style="border: 3px solid var(--ink);"><span class="nm">bw-2</span><span class="lab">3px</span></div>
  <div class="box" style="border: 4px solid var(--ink); border-radius: 0;"><span class="nm">bw-3 / r-0</span><span class="lab">4px / 0</span></div>
  <div class="box" style="border: 4px solid var(--ink); border-radius: 4px;"><span class="nm">r-2</span><span class="lab">4 radius</span></div>
  <div class="box" style="border: 6px solid var(--ink); border-radius: 8px;"><span class="nm">bw-4 / r-3</span><span class="lab">6px / 8</span></div>
</div>
</body></html>
