<!doctype html>
<html><head><meta charset="utf-8"/>
<title>BRUT — Password preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 760px; }
</style>
</head>
<body>

<h2>Default (hidden)</h2>
<div class="grid">
  <div class="brut-field">
    <label class="brut-field__label">Password</label>
    <div class="brut-password" data-brut="password">
      <input class="brut-input" type="password" name="password" placeholder="Enter password…">
      <button class="brut-password__toggle">SHOW</button>
    </div>
  </div>

  <div class="brut-field">
    <label class="brut-field__label">Confirm password</label>
    <div class="brut-password" data-brut="password">
      <input class="brut-input" type="password" name="confirm" placeholder="Confirm password…">
      <button class="brut-password__toggle">SHOW</button>
    </div>
  </div>
</div>

<h2>With value</h2>
<div class="brut-field" style="max-width:360px;">
  <label class="brut-field__label">Current password</label>
  <div class="brut-password" data-brut="password">
    <input class="brut-input" type="password" name="current" value="hunter2secret">
    <button class="brut-password__toggle">SHOW</button>
  </div>
</div>

<script src="../dist/brut.js" defer></script>
<div data-brut="theme-switcher"></div>
</body></html>
