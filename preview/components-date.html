<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Date picker</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 760px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Empty</h2>
<div class="grid">
  <div class="brut-field">
    <label class="brut-field__label">Due date</label>
    <div class="brut-date" data-brut="date" data-brut-name="due">
      <input class="brut-input brut-date__field" type="text" readonly placeholder="YYYY-MM-DD" />
      <input type="hidden" />
    </div>
  </div>
  <div class="brut-field">
    <label class="brut-field__label">Pre-filled</label>
    <div class="brut-date" data-brut="date" data-brut-name="start">
      <input class="brut-input brut-date__field" type="text" readonly value="2026-05-15" />
      <input type="hidden" />
    </div>
  </div>
</div>

<h2>With min constraint (no past dates)</h2>
<div class="brut-date" data-brut="date" data-brut-name="delivery" data-brut-min="2026-05-10" style="max-width:280px;">
  <input class="brut-input brut-date__field" type="text" readonly placeholder="Pick a future date">
</div>

<h2>Live event log</h2>
<pre id="log">Pick a date…</pre>

<script src="../dist/brut.js"></script>
<script>
  document.querySelectorAll('[data-brut="date"]').forEach(function (el) {
    el.addEventListener('brut:change', function (e) {
      var pre = document.getElementById('log');
      pre.textContent = '[' + new Date().toLocaleTimeString() + '] ' + JSON.stringify(e.detail);
    });
  });
</script>
<div data-brut="theme-switcher"></div>
</body></html>
