<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRUT — Stepper preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 760px; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Default (0–99, step 1)</h2>
<div class="brut-field" style="max-width:240px;">
  <label class="brut-field__label">Quantity</label>
  <div class="brut-stepper" data-brut="stepper">
    <button class="brut-stepper__btn" data-brut-step="down">−</button>
    <input class="brut-stepper__input" type="number" min="0" max="99" step="1" value="0">
    <button class="brut-stepper__btn" data-brut-step="up">+</button>
  </div>
</div>

<h2>Variants</h2>
<div class="grid">
  <div class="brut-field">
    <label class="brut-field__label">Adults (1–10)</label>
    <div class="brut-stepper" data-brut="stepper">
      <button class="brut-stepper__btn" data-brut-step="down">−</button>
      <input class="brut-stepper__input" type="number" min="1" max="10" step="1" value="2">
      <button class="brut-stepper__btn" data-brut-step="up">+</button>
    </div>
  </div>

  <div class="brut-field">
    <label class="brut-field__label">Step 5 (0–100)</label>
    <div class="brut-stepper" data-brut="stepper">
      <button class="brut-stepper__btn" data-brut-step="down">−</button>
      <input class="brut-stepper__input" type="number" min="0" max="100" step="5" value="25">
      <button class="brut-stepper__btn" data-brut-step="up">+</button>
    </div>
  </div>

  <div class="brut-field">
    <label class="brut-field__label">Negative allowed</label>
    <div class="brut-stepper" data-brut="stepper">
      <button class="brut-stepper__btn" data-brut-step="down">−</button>
      <input class="brut-stepper__input" type="number" min="-10" max="10" step="1" value="0">
      <button class="brut-stepper__btn" data-brut-step="up">+</button>
    </div>
  </div>

  <div class="brut-field">
    <label class="brut-field__label">Decimal step 0.1</label>
    <div class="brut-stepper" data-brut="stepper">
      <button class="brut-stepper__btn" data-brut-step="down">−</button>
      <input class="brut-stepper__input" type="number" min="0" max="5" step="0.1" value="1.0">
      <button class="brut-stepper__btn" data-brut-step="up">+</button>
    </div>
  </div>
</div>

<h2>Event log</h2>
<pre id="log">Click +/− or use arrow keys…</pre>

<script src="../dist/brut.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-brut="stepper"] input').forEach(function (input) {
      input.addEventListener('change', function () {
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] value: ' + input.value;
      });
    });
  });
</script>
<div data-brut="theme-switcher"></div>
</body></html>
