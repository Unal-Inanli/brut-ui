<!doctype html>
<html><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRUT — Checkbox preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .row { display: flex; gap: var(--sp-4); align-items: center; flex-wrap: wrap; }
  pre { background: var(--paper-2); border: 3px solid var(--ink); padding: 12px; font-family: var(--font-mono); font-size: 12px; max-width: 640px; }
</style>
</head>
<body>

<h2>Default + checked</h2>
<div class="row">
  <label class="brut-checkbox" data-brut="checkbox"><input type="checkbox" hidden /></label>
  <label class="brut-checkbox brut-checkbox--on" data-brut="checkbox"><input type="checkbox" hidden checked /></label>
</div>

<h2>Inside a label group</h2>
<div class="row" style="gap: var(--sp-6);">
  <label style="display:inline-flex; gap:var(--sp-3); align-items:center;">
    <span class="brut-checkbox" data-brut="checkbox"><input type="checkbox" name="opt" value="a" hidden /></span>
    <span>Option A</span>
  </label>
  <label style="display:inline-flex; gap:var(--sp-3); align-items:center;">
    <span class="brut-checkbox brut-checkbox--on" data-brut="checkbox"><input type="checkbox" name="opt" value="b" hidden checked /></span>
    <span>Option B (default on)</span>
  </label>
</div>

<h2>Event log</h2>
<pre id="log">Click a checkbox…</pre>

<script src="../dist/brut.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('[data-brut="checkbox"]').forEach(function (el) {
      el.addEventListener('brut:change', function (e) {
        document.getElementById('log').textContent =
          '[' + new Date().toLocaleTimeString() + '] ' + JSON.stringify(e.detail);
      });
    });
  });
</script>
<div data-brut="theme-switcher"></div>
</body></html>
