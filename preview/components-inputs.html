<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Inputs</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--paper); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px;}
  label { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  input, select, textarea {
    font-family: var(--font-sans);
    font-size: 15px;
    padding: 12px 14px;
    background: var(--bone);
    border: 4px solid var(--ink);
    box-shadow: var(--shadow-xs);
    outline: none;
    color: var(--ink);
  }
  input:focus, select:focus, textarea:focus {
    box-shadow: var(--shadow-sm);
    background: var(--primary-soft);
  }
  .err { border-color: var(--danger); background: var(--danger-bg);}
  .hint { font-size: 12px; color: var(--concrete-400); }
  .err-hint { font-size: 12px; color: var(--danger); font-weight: 700;}
</style></head>
<body>
<div class="row">
  <div class="field">
    <label>Email</label>
    <input value="rex@brut.dev" />
    <div class="hint">We never share. Brut promise.</div>
  </div>
  <div class="field">
    <label>Plan</label>
    <select><option>Solo Operator</option><option>Studio</option></select>
    <div class="hint">Pick your size.</div>
  </div>
  <div class="field">
    <label>Password</label>
    <input class="err" type="password" value="••••" />
    <div class="err-hint">Too short. Try again.</div>
  </div>
  <div class="field">
    <label>Note</label>
    <textarea rows="2">Make it loud.</textarea>
  </div>
</div>
</body></html>
