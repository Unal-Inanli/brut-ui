<!doctype html>
<html><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRUT — Select preview</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 22px; letter-spacing: 0.04em; margin: 32px 0 12px; }
  .stack { display: flex; flex-direction: column; gap: var(--sp-4); max-width: 360px; }
</style>
</head>
<body>

<h2>Default</h2>
<div class="stack">
  <select class="brut-select">
    <option>Choose a planet…</option>
    <option>Mercury</option>
    <option>Venus</option>
    <option>Earth</option>
    <option>Mars</option>
  </select>
</div>

<h2>With grouped options</h2>
<div class="stack">
  <select class="brut-select">
    <optgroup label="Inner">
      <option>Mercury</option>
      <option>Venus</option>
      <option>Earth</option>
      <option>Mars</option>
    </optgroup>
    <optgroup label="Outer">
      <option>Jupiter</option>
      <option>Saturn</option>
      <option>Uranus</option>
      <option>Neptune</option>
    </optgroup>
  </select>
</div>

<h2>States</h2>
<div class="stack">
  <select class="brut-select" required>
    <option value="">Required (empty)</option>
    <option>One</option>
    <option>Two</option>
  </select>
  <select class="brut-select" disabled>
    <option>Disabled</option>
  </select>
</div>

<div data-brut="theme-switcher"></div>
</body></html>
