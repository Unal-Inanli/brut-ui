<!doctype html>
<html><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cards</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--paper); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .card {
    background: var(--bone);
    border: 4px solid var(--ink);
    box-shadow: var(--shadow-md);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    height: 200px;
  }
  .card.alt { background: var(--primary); }
  .card.ink { background: var(--ink); color: var(--paper); }
  .eyebrow { font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; }
  .title { font-family: var(--font-display); font-size: 22px; line-height: 1; text-transform: uppercase;}
  .body { font-size: 13px; line-height: 1.4; }
  .foot { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 12px;}
  .num { font-family: var(--font-display); font-size: 56px; line-height: 1;}
  .pill { padding: 4px 8px; border: 2px solid currentColor; font-family: var(--font-display); text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em;}
</style></head>
<body>
<div class="grid">
  <div class="card">
    <span class="eyebrow">Project</span>
    <div class="title">Concrete<br/>Mixer v3</div>
    <div class="body">A toolkit for designers who refuse to round corners.</div>
    <div class="foot"><span>12 contributors</span><span class="pill">Active</span></div>
  </div>
  <div class="card alt">
    <span class="eyebrow">Stat</span>
    <div class="num">94<span style="font-size:32px">%</span></div>
    <div class="body">of users keep the default theme.</div>
    <div class="foot"><span>vs. 81% last qtr</span></div>
  </div>
  <div class="card ink">
    <span class="eyebrow" style="color: var(--pop-lime)">Drop</span>
    <div class="title" style="color: var(--primary)">Loud<br/>Type Pack</div>
    <div class="body">8 display weights. No apologies.</div>
    <div class="foot"><span>Free</span><span class="pill" style="border-color: var(--pop-lime); color: var(--pop-lime)">Get →</span></div>
  </div>
</div>
<div data-brut="theme-switcher"></div>
<script src="../dist/brut.js"></script>
</body></html>
