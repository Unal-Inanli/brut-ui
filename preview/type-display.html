<!doctype html>
<html><head><meta charset="utf-8"/>
<title>Type — Display</title>
<link rel="stylesheet" href="../dist/brut.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--paper); }
  .specimen { font-family: var(--font-display); text-transform: uppercase; line-height: 0.9; letter-spacing: -0.04em; color: var(--ink); }
  .d1 { font-size: 96px; }
  .d2 { font-size: 64px; margin-top: 6px; }
  .d3 { font-size: 40px; margin-top: 6px; letter-spacing: -0.02em; }
  .meta { font-family: var(--font-mono); font-size: 11px; margin-top: 14px; color: var(--concrete-400); display: flex; gap: 14px; flex-wrap: wrap; }
  .meta b { color: var(--ink); }
</style></head>
<body>
<div class="specimen d1">BRUT.</div>
<div class="specimen d2">SHIP LOUD.</div>
<div class="specimen d3">BUILD IT LIKE YOU MEAN IT.</div>
<div class="meta">
  <span><b>D1</b> 128px / 0.9 / -0.04em</span>
  <span><b>D2</b> 88px / 0.92 / -0.04em</span>
  <span><b>D3</b> 64px / 0.95 / -0.02em</span>
  <span>Archivo Black · uppercase · text-wrap: balance</span>
</div>
</body></html>
